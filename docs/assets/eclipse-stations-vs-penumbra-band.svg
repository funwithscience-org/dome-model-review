<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="system-ui, -apple-system, sans-serif" font-size="11" role="img" aria-label="Disc-projected positions of nine dome eclipse stations and the NASA path of totality, showing all stations lie 444-4084 km from the path while the dome geometry only allows signal within 42 km."
>
  <title>9-station coverage falsification under dome geometry</title>
  <desc>The 9 magnetic-eclipse stations on the dome's published list are projected onto the disc using azimuthal-equidistant from the North Pole. The Aug 12 2026 NASA umbra central line is similarly projected. Per-station min-distance ranges from 444 km (Ebro) to 4084 km (Canary Islands). The dome-geometry penumbra band (85 km wide) is too thin to render at this scale; an inset shows it at 50x magnification at the path-Ebro tangent point. Under dome geometry, all 9 stations must record zero magnetic eclipse signal.</desc>
  <rect x="0" y="0" width="800" height="800" fill="#0d1117"/>
  <circle cx="97.2" cy="396.7" r="239.8" fill="none" stroke="#1f2937" stroke-dasharray="2,4" stroke-width="0.5"/>
  <text x="337" y="394" fill="#3a4a5e" font-size="9">5.0k km</text>
  <circle cx="97.2" cy="396.7" r="359.6" fill="none" stroke="#1f2937" stroke-dasharray="2,4" stroke-width="0.5"/>
  <text x="457" y="394" fill="#3a4a5e" font-size="9">7.5k km</text>
  <circle cx="97.2" cy="396.7" r="479.5" fill="none" stroke="#1f2937" stroke-dasharray="2,4" stroke-width="0.5"/>
  <text x="577" y="394" fill="#3a4a5e" font-size="9">10.0k km</text>
  <circle cx="97.2" cy="396.7" r="599.4" fill="none" stroke="#1f2937" stroke-dasharray="2,4" stroke-width="0.5"/>
  <text x="697" y="394" fill="#3a4a5e" font-size="9">12.5k km</text>
  <circle cx="97.2" cy="396.7" r="719.3" fill="none" stroke="#1f2937" stroke-dasharray="2,4" stroke-width="0.5"/>
  <text x="816" y="394" fill="#3a4a5e" font-size="9">15.0k km</text>
  <circle cx="97.2" cy="396.7" r="3" fill="#4a5568"/>
  <text x="103" y="401" fill="#6b7c8f" font-size="10">disc center (north pole)</text>
  <polyline points="71.9,217.2 155.8,295.2 160.2,407.8 165.0,464.6 219.7,499.6 278.0,509.8 338.4,510.3 377.8,498.9 425.2,490.8 466.8,478.7 507.4,465.4 546.5,455.9 580.1,443.2 608.1,428.0 619.4,415.0" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="338" y="498" fill="#fb923c" font-size="11" font-weight="bold" text-anchor="middle">NASA umbra path (Aug 12 2026)</text>
  <text x="338" y="528" fill="#fb923c" font-size="9" text-anchor="middle">projected onto disc</text>
  <polyline points="71.9,217.2 155.8,295.2 160.2,407.8 165.0,464.6 219.7,499.6 278.0,509.8 338.4,510.3 377.8,498.9 425.2,490.8 466.8,478.7 507.4,465.4 546.5,455.9 580.1,443.2 608.1,428.0 619.4,415.0" fill="none" stroke="#f97316" stroke-opacity="0.18" stroke-width="4.0"/>
  <circle cx="620.2" cy="393.7" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="629" y="398" fill="#e5e7eb" font-size="10" font-weight="600">E001 Ebro</text>
  <text x="629" y="409" fill="#9ca3af" font-size="9">444 km from path (11x R_p)</text>
  <circle cx="633.7" cy="437.5" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="539" y="442" fill="#e5e7eb" font-size="10" font-weight="600">E002 San Pablo</text>
  <text x="539" y="453" fill="#9ca3af" font-size="9">533 km from path (13x R_p)</text>
  <circle cx="466.5" cy="417.4" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="475" y="413" fill="#e5e7eb" font-size="10" font-weight="600">E003 Eskdalemuir</text>
  <text x="475" y="424" fill="#9ca3af" font-size="9">1217 km from path (29x R_p)</text>
  <circle cx="415.6" cy="403.3" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="425" y="407" fill="#e5e7eb" font-size="10" font-weight="600">E004 Lerwick</text>
  <text x="425" y="418" fill="#9ca3af" font-size="9">1808 km from path (43x R_p)</text>
  <circle cx="511.8" cy="429.3" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="432" y="433" fill="#e5e7eb" font-size="10" font-weight="600">E005 Hartland</text>
  <text x="432" y="444" fill="#9ca3af" font-size="9">710 km from path (17x R_p)</text>
  <circle cx="491.8" cy="308.0" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="501" y="312" fill="#e5e7eb" font-size="10" font-weight="600">E006 Niemegk</text>
  <text x="501" y="323" fill="#9ca3af" font-size="9">3266 km from path (78x R_p)</text>
  <circle cx="728.1" cy="582.8" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="737" y="587" fill="#e5e7eb" font-size="10" font-weight="600">E007 Canary Islands</text>
  <text x="737" y="598" fill="#9ca3af" font-size="9">4084 km from path (97x R_p)</text>
  <circle cx="544.4" cy="379.1" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="553" y="383" fill="#e5e7eb" font-size="10" font-weight="600">E008 Chambon</text>
  <text x="553" y="394" fill="#9ca3af" font-size="9">1514 km from path (36x R_p)</text>
  <circle cx="622.3" cy="474.5" r="6" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
  <text x="542" y="478" fill="#e5e7eb" font-size="10" font-weight="600">E009 Coimbra</text>
  <text x="542" y="489" fill="#9ca3af" font-size="9">993 km from path (24x R_p)</text>
  <text x="20" y="30" fill="#f9fafb" font-size="16" font-weight="700">Dome geometry vs. dome's own 9-station list — Aug 12 2026 eclipse</text>
  <text x="20" y="48" fill="#9ca3af" font-size="11">Disc projection: AE from north pole, R_disc = 20,015 km (dome's published rim).</text>
  <text x="20" y="62" fill="#9ca3af" font-size="11">Penumbra ground radius R_p = 42 km (from h_Sun=5,733 km, h_Moon=2,534 km, NASA Besselian angles).</text>
  <rect x="570" y="675" width="220" height="105" fill="#0d1117" stroke="#1f2937" stroke-width="1" rx="4"/>
  <text x="580" y="690" fill="#e5e7eb" font-weight="600" font-size="11">Legend</text>
  <circle cx="588" cy="708" r="5" fill="#ef4444" stroke="#0d1117" stroke-width="1"/>
  <text x="600" y="712" fill="#d1d5db" font-size="10">station outside 85-km band (must record zero)</text>
  <circle cx="588" cy="728" r="5" fill="#22c55e" stroke="#0d1117" stroke-width="1"/>
  <text x="600" y="732" fill="#d1d5db" font-size="10">station inside 85-km band (could see signal)</text>
  <line x1="582" y1="748" x2="598" y2="748" stroke="#f97316" stroke-width="3"/>
  <text x="604" y="752" fill="#d1d5db" font-size="10">NASA umbra path projected onto disc</text>
  <text x="582" y="772" fill="#9ca3af" font-size="9" font-style="italic">85-km band rendered at scale ~ 4.0 px wide</text>
  <text x="582" y="783" fill="#9ca3af" font-size="9" font-style="italic">(near-invisible at full disc scale).</text>
  <rect x="20" y="722" width="380" height="62" fill="rgba(34, 197, 94, 0.08)" stroke="#22c55e" stroke-width="1" rx="4" stroke-opacity="0.4"/>
  <text x="30" y="742" fill="#86efac" font-weight="700" font-size="12">Result: 0 of 9 stations within 42-km penumbra radius.</text>
  <text x="30" y="758" fill="#bbf7d0" font-size="10">Closest is Ebro at 444 km (10.6x R_p). Furthest is Canary Islands at 4,084 km (97x R_p).</text>
  <text x="30" y="774" fill="#bbf7d0" font-size="10">Under dome occultation geometry, all 9 stations must record zero magnetic eclipse signal.</text>
</svg>