<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" role="img" aria-labelledby="ec-title ec-desc" font-family="'Inter',system-ui,sans-serif" style="max-width:100%;height:auto;background:transparent">
<title id="ec-title">Eclipse coverage versus time at Hartland (51.0° N): globe physics vs. dome geometry</title>
<desc id="ec-desc">Time-series plot. The globe-physics curve shows a smooth partial-eclipse profile rising from 0% to roughly 90% over about an hour, plateauing briefly, then declining over another hour — a 2- to 3-hour observable signal. The dome-geometry curve, even under a charitable scenario in which Hartland happens to fall under the moon's penumbra, shows a flat zero baseline across the same window with a brief sub-minute spike under the moon's transit; if Hartland sits even tens of kilometres outside the dome's penumbral spot, the curve is identically flat zero.</desc>
<defs>
<style><![CDATA[
.ec-title{font:600 17px 'Inter',sans-serif;fill:var(--heading,#2E4057)}
.ec-sub{font:500 12px 'Inter',sans-serif;fill:var(--ink-2,#3A352D)}
.ec-axis{stroke:var(--ink-3,#6E675B);stroke-width:1}
.ec-grid{stroke:var(--rule,#E4DDCB);stroke-width:1;stroke-dasharray:2 3}
.ec-label{font:500 12px 'Inter',sans-serif;fill:var(--ink-2,#3A352D)}
.ec-tick{font:500 11px 'JetBrains Mono',monospace;fill:var(--ink-3,#6E675B)}
.ec-globe-line{fill:none;stroke:var(--semantic-good,#2e5a2e);stroke-width:2.5;stroke-linecap:round}
.ec-globe-fill{fill:var(--semantic-good,#2e5a2e);fill-opacity:0.10}
.ec-dome-line{fill:none;stroke:var(--semantic-crit,#7a2e2e);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ec-dome-fill{fill:var(--semantic-crit,#7a2e2e);fill-opacity:0.18}
.ec-callout{font:600 13px 'Inter',sans-serif;fill:var(--ink,#181715)}
.ec-legend-box{fill:var(--card-bg,#fafafa);stroke:var(--rule,#E4DDCB)}
]]></style>
</defs>

<text class="ec-title" x="40" y="34">Eclipse coverage at Hartland (51.0° N) — Aug 12, 2026</text>
<text class="ec-sub" x="40" y="54">Sun obscuration vs. UTC, comparing standard physics with dome-model geometry</text>

<!-- Plot area: x from 90 to 980, y from 90 to 420 -->
<!-- X: 09:00 .. 13:00 UT (4 hours); 09:00 → x=90, 13:00 → x=980. dx/h = 222.5 -->
<!-- Y: 100% → y=90, 0% → y=420. dy/% = 3.3 -->

<!-- Y-axis -->
<line class="ec-axis" x1="90" y1="90" x2="90" y2="420"/>
<line class="ec-axis" x1="90" y1="420" x2="980" y2="420"/>

<!-- Y gridlines and ticks -->
<g>
  <line class="ec-grid" x1="90" y1="90" x2="980" y2="90"/>
  <text class="ec-tick" x="84" y="94" text-anchor="end">100%</text>
  <line class="ec-grid" x1="90" y1="156" x2="980" y2="156"/>
  <text class="ec-tick" x="84" y="160" text-anchor="end">80%</text>
  <line class="ec-grid" x1="90" y1="222" x2="980" y2="222"/>
  <text class="ec-tick" x="84" y="226" text-anchor="end">60%</text>
  <line class="ec-grid" x1="90" y1="288" x2="980" y2="288"/>
  <text class="ec-tick" x="84" y="292" text-anchor="end">40%</text>
  <line class="ec-grid" x1="90" y1="354" x2="980" y2="354"/>
  <text class="ec-tick" x="84" y="358" text-anchor="end">20%</text>
  <text class="ec-tick" x="84" y="424" text-anchor="end">0%</text>
</g>

<!-- X ticks (every 30 min) -->
<g>
  <line class="ec-axis" x1="90" y1="420" x2="90" y2="425"/>
  <text class="ec-tick" x="90" y="440" text-anchor="middle">09:00</text>
  <line class="ec-axis" x1="201" y1="420" x2="201" y2="425"/>
  <text class="ec-tick" x="201" y="440" text-anchor="middle">09:30</text>
  <line class="ec-axis" x1="313" y1="420" x2="313" y2="425"/>
  <text class="ec-tick" x="313" y="440" text-anchor="middle">10:00</text>
  <line class="ec-axis" x1="424" y1="420" x2="424" y2="425"/>
  <text class="ec-tick" x="424" y="440" text-anchor="middle">10:30</text>
  <line class="ec-axis" x1="535" y1="420" x2="535" y2="425"/>
  <text class="ec-tick" x="535" y="440" text-anchor="middle">11:00</text>
  <line class="ec-axis" x1="646" y1="420" x2="646" y2="425"/>
  <text class="ec-tick" x="646" y="440" text-anchor="middle">11:30</text>
  <line class="ec-axis" x1="757" y1="420" x2="757" y2="425"/>
  <text class="ec-tick" x="757" y="440" text-anchor="middle">12:00</text>
  <line class="ec-axis" x1="868" y1="420" x2="868" y2="425"/>
  <text class="ec-tick" x="868" y="440" text-anchor="middle">12:30</text>
  <line class="ec-axis" x1="980" y1="420" x2="980" y2="425"/>
  <text class="ec-tick" x="980" y="440" text-anchor="middle">13:00</text>
</g>
<text class="ec-label" x="535" y="464" text-anchor="middle">UTC time on August 12, 2026</text>
<text class="ec-label" x="38" y="255" transform="rotate(-90,38,255)" text-anchor="middle">Sun obscuration</text>

<!-- ============================================================== -->
<!-- GLOBE-PHYSICS CURVE (smooth bell, peak ~88-90% at Hartland) -->
<!-- ~1st contact 09:55, max coverage ~11:18, 4th contact ~12:42 -->
<!-- Approximate as a smooth Gaussian-shaped bump centered at 11:18 -->
<!-- 09:55 = x=294, 11:18 = x=595, 12:42 = x=896 -->
<!-- peak at 11:18 → coverage ~88% → y = 420 - 88*3.3 = 420 - 290 = 130 -->
<g>
<!-- Filled area under globe curve -->
<path class="ec-globe-fill" d="M 294 420
  C 360 420, 420 380, 460 305
  C 500 230, 540 165, 595 130
  C 650 165, 690 230, 730 305
  C 770 380, 830 420, 896 420
  L 896 420 L 294 420 Z"/>
<!-- Stroke for globe curve -->
<path class="ec-globe-line" d="M 90 420 L 294 420
  C 360 420, 420 380, 460 305
  C 500 230, 540 165, 595 130
  C 650 165, 690 230, 730 305
  C 770 380, 830 420, 896 420
  L 980 420"/>

<!-- Annotation: peak coverage -->
<line class="ec-axis" x1="595" y1="130" x2="595" y2="106" stroke-width="0.8"/>
<text class="ec-callout" x="595" y="100" text-anchor="middle" fill="var(--semantic-good,#2e5a2e)">~88% peak (Hartland, 11:18 UT)</text>
<text class="ec-tick" x="595" y="118" text-anchor="middle">Globe physics (NASA Besselian elements)</text>

<!-- Duration arrow -->
<line class="ec-axis" x1="294" y1="396" x2="896" y2="396" marker-start="url(#ec-arrow)" marker-end="url(#ec-arrow)"/>
<text class="ec-tick" x="595" y="392" text-anchor="middle" fill="var(--semantic-good,#2e5a2e)">~2h 47m visible (1st → 4th contact)</text>
</g>

<defs>
<marker id="ec-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--ink-3,#6E675B)"/></marker>
</defs>

<!-- ============================================================== -->
<!-- DOME-GEOMETRY CURVE — flat at 0 except ~60-second penumbra spike -->
<!-- Charitable scenario: Hartland happens to fall in the penumbra at 11:18 UT -->
<!-- ~85 km penumbra / 87 km/min lateral velocity = ~58 sec total partial coverage -->
<!-- 60 seconds at x=595 corresponds to dx ≈ 60s * (980-90)/(4*3600) = 60 * 0.062 = 3.7 px -->
<!-- Spike shape: brief triangular spike up to ~99% (charitable: in totality band for ~1 sec) -->

<g>
<path class="ec-dome-fill" d="M 90 420 L 591 420 L 593 392 L 594 95 L 596 95 L 597 392 L 599 420 L 980 420 Z"/>
<path class="ec-dome-line" d="M 90 420 L 591 420 L 593 392 L 594 95 L 596 95 L 597 392 L 599 420 L 980 420"/>

<!-- Annotation for dome -->
<line class="ec-axis" x1="595" y1="95" x2="700" y2="78" stroke-width="0.8"/>
<text class="ec-callout" x="708" y="82" fill="var(--semantic-crit,#7a2e2e)">~1 s totality (charitable case)</text>
<text class="ec-tick" x="708" y="98">if Hartland sits in 1.3-km shadow band</text>

<!-- Annotation for the flat-zero scenario -->
<text class="ec-callout" x="120" y="370" fill="var(--semantic-crit,#7a2e2e)">Dome geometry baseline = 0 obscuration</text>
<text class="ec-tick" x="120" y="386">If Hartland is &gt; ~40 km from sub-moon point: flat zero, no eclipse at all</text>
</g>

<!-- Reference markers: 1st contact, mid-eclipse, 4th contact -->
<g>
<line class="ec-grid" x1="294" y1="90" x2="294" y2="420"/>
<text class="ec-tick" x="294" y="86" text-anchor="middle">09:55</text>
<line class="ec-grid" x1="595" y1="90" x2="595" y2="420"/>
<line class="ec-grid" x1="896" y1="90" x2="896" y2="420"/>
<text class="ec-tick" x="896" y="86" text-anchor="middle">12:42</text>
</g>

<!-- Legend -->
<g transform="translate(720,470)">
  <rect class="ec-legend-box" x="0" y="0" width="260" height="60" rx="4"/>
  <line class="ec-globe-line" x1="12" y1="20" x2="42" y2="20"/>
  <text class="ec-label" x="50" y="24">Globe physics (NASA Besselian elements)</text>
  <line class="ec-dome-line" x1="12" y1="44" x2="42" y2="44"/>
  <text class="ec-label" x="50" y="48">Dome geometry (charitable scenario)</text>
</g>

<!-- Footer -->
<text class="ec-tick" x="40" y="514">Globe profile: NASA Besselian elements (eclipse.gsfc.nasa.gov, Aug 12 2026 path data) yield ~88% obscuration at Hartland (51.00° N, −4.48° W).</text>
<text class="ec-tick" x="40" y="528">Dome profile: derived from h_Sun=5,733 km, h_Moon=2,534 km, R_Sun≈26 km, R_Moon≈12 km, lateral velocity 87 km/min over a 24-hour disc transit.</text>
</svg>
