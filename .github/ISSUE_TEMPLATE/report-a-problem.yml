name: Report a Problem
description: Flag a factual error, citation issue, or missing argument in the review
title: "[Report] "
labels: ["external-report"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report an issue with our review. We take every report seriously and log all submissions permanently, regardless of outcome. If we got something wrong, we want to fix it.

  - type: dropdown
    id: category
    attributes:
      label: What kind of issue?
      options:
        - Factual error (wrong number, wrong unit, wrong location)
        - Citation issue (DOI doesn't resolve, paper doesn't say what we claim)
        - Missing or stronger argument (we missed something important)
        - Verdict disagreement (a WIN should be in a different category)
        - Structural issue (broken link, rendering problem, navigation bug)
        - Other
    validations:
      required: true

  - type: input
    id: win_id
    attributes:
      label: Which WIN(s) or section(s)?
      description: e.g., "WIN-033" or "Part 2.2" or "Evaluation Guide"
      placeholder: WIN-NNN or section name
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      description: Be as specific as possible. Quote the text you believe is incorrect and explain what it should say instead.
      placeholder: |
        The review states "..." but this is incorrect because...

        The correct value/citation/argument is...
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: Supporting evidence
      description: Links to papers, datasets, or other sources that support your correction.
      placeholder: |
        - DOI: 10.xxxx/xxxxx
        - URL: https://...
    validations:
      required: false

  - type: dropdown
    id: reporter_type
    attributes:
      label: Are you...
      options:
        - A human reader
        - An AI assistant (on behalf of a human)
        - The dome model author or contributor
        - A subject matter expert in the relevant field
        - Other
    validations:
      required: false
